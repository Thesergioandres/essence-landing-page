name: Deploy to Clouding

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLOUDING_SSH_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no deploy@93.189.89.195 << 'ENDSSH'
            cd /home/deploy/app &&
            # Respaldar archivos de entorno antes del clean
            cp .env /tmp/.env.backup 2>/dev/null || true &&
            cp client/.env.production /tmp/.env.production.backup 2>/dev/null || true &&
            git reset --hard HEAD &&
            git clean -fd &&
            git pull origin main &&
            # Restaurar archivos de entorno
            cp /tmp/.env.backup .env 2>/dev/null || true &&
            cp /tmp/.env.production.backup client/.env.production 2>/dev/null || true &&
            cd client && npm install && npm run build &&
            cd .. &&
            docker-compose down --remove-orphans &&
            docker system prune -af &&
            docker volume prune -f &&
            docker-compose up -d --build
          ENDSSH
