name: Deploy to Clouding

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CLOUDING_SSH_KEY }}

      - name: Deploy via SSH
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: |
          ssh -o StrictHostKeyChecking=no deploy@93.189.89.195 "
            cd /home/deploy/app &&
            git reset --hard HEAD &&
            git clean -fd &&
            git pull origin main &&
            echo 'MONGODB_URI=${MONGODB_URI}' > .env &&
            echo 'REDIS_URL=redis://redis:6379' >> .env &&
            echo 'PORT=5000' >> .env &&
            echo 'JWT_SECRET=${JWT_SECRET}' >> .env &&
            echo 'NODE_ENV=production' >> .env &&
            echo 'ENABLE_CLOUDINARY=true' >> .env &&
            echo 'CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}' >> .env &&
            echo 'CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}' >> .env &&
            echo 'CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}' >> .env &&
            echo 'VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}' >> .env &&
            echo 'VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}' >> .env &&
            echo 'VAPID_SUBJECT=${VAPID_SUBJECT}' >> .env &&
            echo 'MONGO_EXPRESS_USER=admin' >> .env &&
            echo 'MONGO_EXPRESS_PASS=admin123' >> .env &&
            echo 'VITE_API_URL=/api' > client/.env.production &&
            cd client && npm install && npm run build &&
            cd .. &&
            docker-compose down --remove-orphans &&
            docker system prune -af &&
            docker volume prune -f &&
            docker-compose up -d --build
          "
